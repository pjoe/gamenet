name: Publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm run build:lib

      - name: Publish @gamenet/core
        working-directory: packages/gamenet
        run: pnpm publish --no-git-checks --access public

      - name: Publish @gamenet/bjs
        working-directory: packages/gamenet-bjs
        run: pnpm publish --no-git-checks --access public

      - name: Clean up dist folders
        run: rm -rf packages/*/dist
