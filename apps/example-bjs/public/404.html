<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Redirecting&hellip;</title>
    <script>
      // Single-page app redirect for GitHub Pages
      // Stores the path in sessionStorage and redirects to index.html
      // which will restore the URL via history.replaceState.
      var segmentCount = 1; // number of path segments to keep (repo name)
      var l = window.location;
      l.replace(
        l.protocol +
          "//" +
          l.hostname +
          (l.port ? ":" + l.port : "") +
          l.pathname
            .split("/")
            .slice(0, 1 + segmentCount)
            .join("/") +
          "/?p=" +
          encodeURIComponent(
            l.pathname
              .slice(1)
              .split("/")
              .slice(segmentCount)
              .join("/")
              .replace(/&/g, "~and~")
          ) +
          (l.search
            ? "&q=" +
              encodeURIComponent(l.search.slice(1).replace(/&/g, "~and~"))
            : "") +
          l.hash
      );
    </script>
  </head>
  <body></body>
</html>
